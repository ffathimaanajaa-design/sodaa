                    class="absolute inset-0 bg-[url('Untitled design.png')] bg-cover bg-center opacity-10 mix-blend-overlay">
                </div>

                <img src="sodasarbath.png" alt="Soda Sarbath Logo"
                    class="w-32 mb-6 drop-shadow-md relative z-10">

                <h2 class="text-3xl font-bold mb-4 font-['Lobster'] relative z-10">Get in Touch</h2>
                <p class="mb-6 relative z-10">Have questions about our refreshing soda sarbath? We'd love to hear from
                    you!</p>

                <div class="space-y-4 text-left w-full max-w-xs relative z-10">
                  
                    <div class="flex items-center gap-3">
                        <i class="fas fa-envelope text-green-300 w-6 text-center"></i>
                        <a href="mailto:wellknownfoodsandbeverages@gmail.com"

                    </div>
                    <div class="flex items-center gap-3">

                </div>
            </div>

            <!-- Contact Form Side -->
            <div class="md:w-1/2 p-8 md:p-12">
                <form class="space-y-4" id="contactForm">

    <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-input" placeholder="John Doe" required>
    </div>

    <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="john@example.com" required>
    </div>

    <div class="form-group">
        <label class="form-label">Message</label>
        <textarea name="message" rows="4" class="form-textarea" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Message</button>

</form>
            </div>

        </div>
    </section>
